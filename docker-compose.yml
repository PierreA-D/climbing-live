services:
  frontend:
    container_name: climbing-live-front
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./:/app
      - ./.data:/app/.data
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_BASE_URL=http://localhost:3000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - mediamtx

  mediamtx:
    image: bluenviron/mediamtx
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - MTX_API=yes
      - MTX_AUTHMETHOD=http
      - MTX_AUTHHTTPADDRESS=http://host.docker.internal:3000/api/internal/mediamtx/auth
      - MTX_AUTHHTTPEXCLUDE_0_ACTION=api
      - MTX_AUTHHTTPEXCLUDE_1_ACTION=metrics
      - MTX_AUTHHTTPEXCLUDE_2_ACTION=pprof
      # HLS : segments courts pour réduire la latence, LL-HLS désactivé pour stabilité
      - MTX_HLSSEGMENTDURATION=2s
      - MTX_HLSVARIANT=mpegts
      - MTX_HLSSEGMENTCOUNT=7
    ports:
      - '8554:8554'
      - '8888:8888'
      - '8889:8889'
      - '1935:1935'
      - '9997:9997'
